name: dager-macos-tf55
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pytorch=2.5.*
  - torchvision=0.20.*
  - torchaudio=2.5.*
  - numpy=1.26.*
  - scipy=1.13.*
  - pandas=2.2.*
  - scikit-learn=1.5.*
  - nltk=3.8.*
  - datasets=2.19.*
  - dill=0.3.8
  - evaluate
  - fsspec=2024.3.1
  - multiprocess=0.70.16
  - pyarrow=14.0.*
  - protobuf>=5,<6
  - tqdm
  - pyyaml
  - pillow
  - psutil
  - filelock
  - requests
  - aiohttp
  - future
  - gitpython
  - boto3
  - importlib_resources
  - neptune-client
  - safetensors
  - sentencepiece
  - ffmpeg
  - tiktoken
  - pip:
      - transformers==5.5.0
      - huggingface-hub==1.11.0
      - tokenizers==0.22.2
      - tiktoken==0.12.0
      - rouge-score==0.1.2
      - accelerate==0.34.2
      - peft==0.13.0
