# Linux/NVIDIA cluster environment for the newer Transformers stack.
# This is the cluster counterpart of the tf55 macOS environment.
#
# Create with:
#   conda env create -f environment_linux_transformers55.yml
# Activate with:
#   conda activate dager-cuda-tf55
#
# If your conda installation tends to mix CPU and CUDA packages, set strict
# channel priority before creating the environment:
#   conda config --set channel_priority strict
# * For CUDA 11, run:    conda install cudatoolkit cuda-version=11
# * For CUDA 12, run:    conda install cuda-cudart cuda-version=12

name: dager-cuda-tf55
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pytorch::pytorch=2.5.*
  - pytorch::torchvision=0.20.*
  - pytorch::torchaudio=2.5.*
  - pytorch::pytorch-cuda=12.1
  - protobuf
  - numpy=1.26.*
  - scipy=1.13.*
  - pandas=2.2.*
  - scikit-learn=1.5.*
  - nltk=3.8.*
  - datasets=2.19.*
  - dill=0.3.8
  - evaluate
  - fsspec=2024.3.1
  - multiprocess=0.70.16
  - pyarrow=14.0.*
  - protobuf>=5,<6
  - tqdm
  - pyyaml
  - pillow
  - psutil
  - filelock
  - requests
  - aiohttp
  - future
  - gitpython
  - boto3
  - importlib_resources
  - neptune-client
  - safetensors
  - sentencepiece
  - ffmpeg
  - tiktoken
  - pip:
      - transformers==5.5.0
      - huggingface-hub==1.11.0
      - tokenizers==0.22.2
      - tiktoken==0.12.0
      - rouge-score==0.1.2
      - accelerate==0.34.2
      - peft==0.13.0
